name: Bug Report
description: Report a bug in openemr-mcp
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include error messages or tracebacks if available.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Configure data source as ...
        2. Call tool ...
        3. Observe error ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version
      description: Output of `pip show openemr-mcp` or the commit SHA.
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: data-source
    attributes:
      label: Data source
      options:
        - mock
        - api
        - db
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15, Ubuntu 24.04, etc."
    validations:
      required: false
